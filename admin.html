<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#E91E63">
  <title>管理後台 - 大江購物冒險</title>
  <link rel="stylesheet" href="css/common.css">
  <style>
    .admin-login { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; background:linear-gradient(135deg,#2d3436,#636e72); }
    .admin-card { width:100%; max-width:400px; background:white; border-radius:20px; padding:32px 24px; box-shadow:0 10px 40px rgba(0,0,0,0.3); }
    .admin-card h2 { text-align:center; margin-bottom:24px; }
    .admin-panel { display:none; } .admin-panel.show { display:block; }
    .admin-section { background:white; border-radius:16px; padding:20px; margin-bottom:16px; box-shadow:var(--shadow); }
    .admin-section h3 { font-size:16px; margin-bottom:12px; }
    .stat-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-bottom:16px; }
    .stat-card { background:#f8f9fa; border-radius:12px; padding:12px; text-align:center; }
    .stat-card .num { font-size:24px; font-weight:900; color:var(--primary); }
    .stat-card .label { font-size:11px; color:var(--text-light); margin-top:4px; }
    .photo-review-card { background:#f8f9fa; border-radius:12px; padding:14px; margin-bottom:12px; }
    .photo-review-card img { width:100%; border-radius:8px; margin-bottom:10px; max-height:240px; object-fit:cover; }
    .photo-review-actions { display:flex; gap:8px; }
    .badge-pending { display:inline-block; padding:3px 10px; border-radius:12px; font-size:11px; font-weight:700; background:#fff3e0; color:#e65100; }
    .badge-approved { display:inline-block; padding:3px 10px; border-radius:12px; font-size:11px; font-weight:700; background:#e8f5e9; color:#2e7d32; }
    .badge-rejected { display:inline-block; padding:3px 10px; border-radius:12px; font-size:11px; font-weight:700; background:#ffebee; color:#c62828; }
  </style>
</head>
<body>
<div class="admin-login" id="adminLogin"><div class="admin-card"><h2>🔐 管理後台</h2><div class="form-group"><label class="form-label">管理員密碼</label><input type="password" class="input" id="adminPwd" placeholder="請輸入密碼"></div><button class="btn btn-primary btn-block" onclick="adminAuth()">登入</button></div></div>
<div class="admin-panel" id="adminPanel">
  <div class="top-bar"><button class="top-bar-back" onclick="window.location.href='map.html'">←</button><div class="top-bar-title">🔧 管理後台</div><div style="width:40px;"></div></div>
  <div class="page-container">
    <div class="admin-section"><h3>📊 即時數據</h3><div class="stat-grid"><div class="stat-card"><div class="num" id="statPlayers">-</div><div class="label">已登入</div></div><div class="stat-card"><div class="num" id="statPlays">-</div><div class="label">遊戲次數</div></div><div class="stat-card"><div class="num" id="statPending">-</div><div class="label">待審照片</div></div><div class="stat-card"><div class="num" id="statTime">-</div><div class="label">目前時間</div></div></div><button class="btn btn-outline btn-sm" onclick="loadDashboard()">🔄 刷新</button></div>
    <div class="admin-section"><h3>📢 發送廣播</h3><textarea class="input" id="broadcastContent" rows="3" placeholder="輸入廣播訊息..." style="resize:none;"></textarea><div style="margin-top:12px;"><button class="btn btn-primary" onclick="sendBroadcast()">📢 發送</button></div></div>
    <div class="admin-section"><h3>📸 照片審核</h3><button class="btn btn-outline btn-sm" onclick="loadPhotos()">🔄 刷新照片</button><div id="photoList" style="margin-top:12px;"></div></div>
    <div class="admin-section"><h3>➕ 手動加分</h3><div class="form-group"><select class="select" id="pointsTeam"><option value="">選擇隊伍</option></select></div><div class="form-group"><input type="number" class="input" id="pointsAmount" placeholder="分數"></div><div class="form-group"><input type="text" class="input" id="pointsReason" placeholder="原因"></div><button class="btn btn-accent" id="addPointsBtn" onclick="addPoints()">確認加分</button></div>
  </div>
</div>
<script src="js/config.js"></script><script src="js/api.js"></script><script src="js/auth.js"></script>
<script>
  API.init(); const ADMIN_PWD = '11201120';
  function adminAuth() { if (document.getElementById('adminPwd').value === ADMIN_PWD) { document.getElementById('adminLogin').style.display = 'none'; document.getElementById('adminPanel').classList.add('show'); initAdmin(); } else alert('密碼錯誤'); }
  function initAdmin() {
    const sel = document.getElementById('pointsTeam');
    CONFIG.TEAMS.forEach(t => { const o = document.createElement('option'); o.value = t.id; o.textContent = `${t.emoji} ${t.name}`; sel.appendChild(o); });
    loadDashboard(); loadPhotos();
    setInterval(() => { loadPhotos(); loadDashboard(); }, 4000);
  }
  async function loadDashboard() {
    try { const d = await API.get('getDashboard', { action:'getDashboard', password:ADMIN_PWD }, 0);
      if (d) { document.getElementById('statPlayers').textContent = d.totalPlayers||0; document.getElementById('statPlays').textContent = d.totalPlays||0; document.getElementById('statPending').textContent = d.pendingPhotos||0; document.getElementById('statTime').textContent = new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'}); }
    } catch {}
  }
  async function loadPhotos() {
    try { const d = await API.get('getPendingPhotos', { action:'getPendingPhotos', password:ADMIN_PWD }, 0);
      if (!d || !d.photos) return; const c = document.getElementById('photoList');
      if (!d.photos.length) { c.innerHTML = '<div style="text-align:center;color:#999;padding:20px;">沒有照片</div>'; return; }
      const sorted = d.photos.sort((a,b) => a.status==='pending'&&b.status!=='pending'?-1:1);
      c.innerHTML = sorted.map(p => { const team = CONFIG.TEAMS.find(t=>t.id===p.teamId); const badge = p.status==='approved'?'badge-approved':p.status==='rejected'?'badge-rejected':'badge-pending'; const text = p.status==='approved'?'✅已通過':p.status==='rejected'?'❌未通過':'⏳待審核';
        return `<div class="photo-review-card"><img src="${p.thumbUrl||p.photoUrl}" loading="lazy"><div style="font-size:12px;color:var(--text-light);margin-bottom:8px;"><strong>${p.playerName}</strong> · ${team?team.emoji+' '+team.name:''} <span class="${badge}" style="margin-left:8px;">${text}</span></div>${p.status==='pending'?`<div class="photo-review-actions"><button class="btn btn-primary btn-sm" id="a-${p.submissionId}" onclick="verifyPhoto('${p.submissionId}',true,this)">✅ 通過 (+300分)</button><button class="btn btn-outline btn-sm" style="color:#f44336;border-color:#f44336;" id="r-${p.submissionId}" onclick="verifyPhoto('${p.submissionId}',false,this)">❌ 不通過</button></div>`:''}</div>`; }).join('');
    } catch {}
  }
  async function verifyPhoto(id, approved, btn) {
    if (!confirm(approved?'確定通過？將加 300 分':'確定不通過？')) return;
    const a = document.getElementById('a-'+id), r = document.getElementById('r-'+id);
    if (a) { a.disabled = true; a.textContent = '處理中...'; } if (r) r.disabled = true;
    try { await API.post('ADMIN', { action:'verifyPhoto', password:ADMIN_PWD, submissionId:id, approved }); alert(approved?'已通過！':'已拒絕'); loadPhotos(); } catch { alert('失敗'); if (a) { a.disabled=false; a.textContent='✅ 通過'; } if (r) r.disabled=false; }
  }
  async function sendBroadcast() { const c = document.getElementById('broadcastContent').value.trim(); if (!c) return alert('請輸入內容'); try { await API.post('ADMIN', { action:'broadcast', password:ADMIN_PWD, type:'text', content:c }); alert('已發送！'); document.getElementById('broadcastContent').value=''; } catch { alert('失敗'); } }
  async function addPoints() {
    const t = document.getElementById('pointsTeam').value, p = parseInt(document.getElementById('pointsAmount').value), r = document.getElementById('pointsReason').value.trim();
    if (!t||!p) return alert('請填寫完整');
    const btn = document.getElementById('addPointsBtn'); btn.disabled=true; btn.textContent='提交中...';
    try { await API.post('ADMIN', { action:'addManualPoints', password:ADMIN_PWD, teamId:parseInt(t), points:p, detail:r }); alert(`已加 ${p} 分！`); document.getElementById('pointsAmount').value=''; document.getElementById('pointsReason').value=''; btn.textContent='✅ 已送出'; setTimeout(()=>{ btn.disabled=false; btn.textContent='確認加分'; },3000); } catch { alert('失敗'); btn.disabled=false; btn.textContent='確認加分'; }
  }
</script>
</body>
</html>
