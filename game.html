<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1a2e">
  <link rel="manifest" href="manifest.json">
  <title>遊戲 - 大江購物冒險</title>
  <link rel="stylesheet" href="css/common.css?v=4">
  <style>
    body { background:#1a1a2e; }
    .game-page { min-height:100vh; min-height:100dvh; position:relative; overflow:hidden; }
    .danmaku-overlay { position:absolute; top:60px; left:0; right:0; height:120px; pointer-events:none; overflow:hidden; z-index:5; }
    .game-intro { position:absolute; top:0;left:0;right:0;bottom:0; display:flex; flex-direction:column; align-items:center; justify-content:center; background:rgba(0,0,0,0.9); z-index:50; color:white; padding:32px; text-align:center; }
    .game-intro-icon { font-size:72px; margin-bottom:16px; animation:bounce 2s infinite; }
    .game-intro-title { font-size:28px; font-weight:900; margin-bottom:8px; }
    .game-intro-desc { font-size:14px; color:rgba(255,255,255,0.7); margin-bottom:8px; line-height:1.6; }
    .game-intro-rounds { font-size:13px; color:var(--accent); margin-bottom:24px; }
    .game-loading { font-size:13px; color:rgba(255,255,255,0.5); margin-top:12px; }
    .game-countdown { position:absolute; top:0;left:0;right:0;bottom:0; display:none; align-items:center; justify-content:center; background:rgba(0,0,0,0.8); z-index:55; }
    .game-countdown-num { font-size:120px; font-weight:900; color:white; animation:pulse 0.5s; }
    .game-canvas-container { width:100%; height:calc(100vh - 100px); height:calc(100dvh - 100px); position:relative; display:flex; align-items:center; justify-content:center; overflow-y:auto; z-index:1; }
    .game-canvas-container.has-dpad { height:calc(100vh - 250px); height:calc(100dvh - 250px); }
    .game-canvas-container canvas { display:block; max-width:100%; max-height:100%; touch-action:none; }
    /* Lives */
    .lives-display { display:flex; gap:2px; align-items:center; }
    .lives-display .heart { font-size:16px; transition:transform 0.3s,opacity 0.3s; }
    .lives-display .heart.lost { opacity:0.2; transform:scale(0.6); }
    /* Result */
    .game-result { position:absolute; top:0;left:0;right:0;bottom:0; display:none; flex-direction:column; align-items:center; justify-content:center; background:rgba(0,0,0,0.92); z-index:60; color:white; text-align:center; padding:24px; overflow-y:auto; }
    .result-icon { font-size:64px; margin-bottom:12px; animation:bounce 1s ease 2; }
    .result-score { font-size:56px; font-weight:900; color:var(--primary); }
    .result-label { font-size:14px; color:rgba(255,255,255,0.6); margin-top:6px; }
    .result-threshold { font-size:12px; color:rgba(255,255,255,0.35); margin-top:8px; }
    .result-fail { color:#f44336; font-size:15px; font-weight:700; margin-top:10px; }
    .result-bonus { margin-top:14px; }
    .trophy-row { display:flex; align-items:center; gap:8px; justify-content:center; margin:3px 0; font-size:13px; }
    .trophy-icon { font-size:18px; }
    .trophy-text { color:rgba(255,255,255,0.6); }
    .trophy-pts { color:var(--accent); font-weight:700; }
    .btn-submit { transition:all 0.3s; min-width:200px; }
    .btn-submit:active { transform:scale(0.95); }
    .btn-submit.submitting { background:#ff9800!important; }
    .btn-submit.submitted { background:#4CAF50!important; }
    /* Frank message system */
    .frank-section { margin-top:16px; width:100%; max-width:340px; animation:fadeIn 0.5s ease 0.3s both; }
    .frank-card { background:rgba(255,255,255,0.06); border:1px solid rgba(0,188,212,0.2); border-radius:16px; padding:16px; backdrop-filter:blur(8px); }
    .frank-header { display:flex; align-items:center; gap:12px; margin-bottom:10px; }
    .frank-avatar { width:48px; height:48px; border-radius:50%; background:linear-gradient(135deg,#00BCD4,#0097A7); display:flex; align-items:center; justify-content:center; font-size:28px; box-shadow:0 0 16px rgba(0,188,212,0.4); flex-shrink:0; position:relative; }
    .frank-avatar::after { content:''; position:absolute; inset:-3px; border-radius:50%; border:2px solid rgba(0,188,212,0.3); animation:pulse 2s ease-in-out infinite; }
    .frank-name { font-size:14px; font-weight:800; color:var(--secondary); }
    .frank-role { font-size:11px; color:rgba(255,255,255,0.4); }
    .frank-msg { font-size:14px; color:rgba(255,255,255,0.85); line-height:1.6; margin-bottom:12px; }
    .frank-responses { display:flex; flex-direction:column; gap:8px; }
    .frank-resp-btn { padding:10px 14px; border-radius:12px; border:1.5px solid rgba(0,188,212,0.25); background:rgba(0,188,212,0.06); color:var(--text); font-size:13px; font-weight:600; cursor:pointer; text-align:left; transition:all 0.2s; }
    .frank-resp-btn:active { background:rgba(0,188,212,0.2); transform:scale(0.97); }
    .frank-resp-btn.selected { border-color:var(--secondary); background:rgba(0,188,212,0.15); }
    .frank-reply { margin-top:10px; padding:10px 14px; background:rgba(0,188,212,0.08); border-radius:12px; font-size:13px; color:var(--secondary); animation:fadeIn 0.3s ease; display:none; }
    /* D-Pad */
    .dpad-container { display:none; position:fixed; bottom:0; left:0; right:0; height:150px; z-index:10; padding-bottom:env(safe-area-inset-bottom,0); background:linear-gradient(transparent,rgba(0,0,0,0.6)); }
    .dpad-container.active { display:flex; align-items:center; justify-content:center; }
    .dpad { position:relative; width:150px; height:130px; }
    .dpad-btn { position:absolute; width:52px; height:52px; border-radius:14px; background:rgba(255,255,255,0.15); border:2px solid rgba(255,255,255,0.3); color:white; font-size:24px; display:flex; align-items:center; justify-content:center; cursor:pointer; user-select:none; -webkit-user-select:none; -webkit-tap-highlight-color:transparent; transition:background 0.1s; }
    .dpad-btn:active,.dpad-btn.pressed { background:rgba(255,255,255,0.45); }
    .dpad-btn.up { top:0; left:50%; transform:translateX(-50%); }
    .dpad-btn.down { bottom:0; left:50%; transform:translateX(-50%); }
    .dpad-btn.left { left:0; top:50%; transform:translateY(-50%); }
    .dpad-btn.right { right:0; top:50%; transform:translateY(-50%); }
    .round-banner { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:linear-gradient(135deg,var(--primary),var(--accent)); color:white; font-size:28px; font-weight:900; padding:16px 40px; border-radius:20px; z-index:45; pointer-events:none; animation:roundBannerAnim 1.5s ease forwards; }
    @keyframes roundBannerAnim { 0%{opacity:0;transform:translate(-50%,-50%) scale(0.5)} 20%{opacity:1;transform:translate(-50%,-50%) scale(1.1)} 40%{transform:translate(-50%,-50%) scale(1)} 80%{opacity:1} 100%{opacity:0;transform:translate(-50%,-50%) scale(0.8)} }
    .btn:disabled { opacity:0.5; cursor:not-allowed; }
    /* Pause overlay */
    .pause-label { font-size:28px; font-weight:900; color:white; margin-bottom:20px; letter-spacing:2px; }
  </style>
</head>
<body>
<div class="game-page">
  <div class="top-bar" style="background:rgba(0,0,0,0.5);">
    <button class="top-bar-back" onclick="showGameSettings()">⚙️</button>
    <div class="top-bar-title" id="gameTitle">🎮</div>
    <div id="roundDisplay" style="width:60px;text-align:center;color:var(--accent);font-size:12px;font-weight:700;"></div>
  </div>
  <div class="game-hud">
    <div class="hud-item"><div class="hud-label">分數</div><div class="hud-value" id="hudScore">0</div></div>
    <div class="hud-item"><div class="hud-label">時間</div><div class="hud-value" id="hudTime">--</div></div>
    <div class="hud-item">
      <div class="hud-label">命</div>
      <div class="hud-value lives-display" id="hudLives">
        <span class="heart">❤️</span><span class="heart">❤️</span><span class="heart">❤️</span>
      </div>
    </div>
  </div>
  <div class="danmaku-overlay" id="danmakuContainer"></div>

  <div class="game-intro" id="gameIntro">
    <div class="game-intro-icon" id="introIcon"></div>
    <div class="game-intro-title" id="introTitle"></div>
    <div class="game-intro-desc" id="introDesc"></div>
    <div class="game-intro-rounds" id="introRounds"></div>
    <button class="btn btn-primary btn-lg" id="btnStart" disabled style="min-width:200px;">
      <span class="spinner" style="width:20px;height:20px;border-width:2px;display:inline-block;vertical-align:middle;margin-right:8px;"></span>
      載入中...
    </button>
    <div class="game-loading" id="loadingMsg">正在載入遊戲引擎...</div>
    <button class="btn btn-outline" style="margin-top:12px;color:white;border-color:rgba(255,255,255,0.3);" onclick="window.location.href='map.html'">↩ 返回地圖</button>
  </div>

  <div class="game-countdown" id="gameCountdown"><div class="game-countdown-num" id="countdownNum">3</div></div>
  <div class="game-canvas-container" id="canvasContainer"><canvas id="gameCanvas"></canvas></div>

  <!-- D-Pad -->
  <div class="dpad-container" id="dpadContainer">
    <div class="dpad">
      <div class="dpad-btn up" ontouchstart="dpadInput('up');this.classList.add('pressed')" ontouchend="this.classList.remove('pressed')" onmousedown="dpadInput('up')">▲</div>
      <div class="dpad-btn left" ontouchstart="dpadInput('left');this.classList.add('pressed')" ontouchend="this.classList.remove('pressed')" onmousedown="dpadInput('left')">◀</div>
      <div class="dpad-btn right" ontouchstart="dpadInput('right');this.classList.add('pressed')" ontouchend="this.classList.remove('pressed')" onmousedown="dpadInput('right')">▶</div>
      <div class="dpad-btn down" ontouchstart="dpadInput('down');this.classList.add('pressed')" ontouchend="this.classList.remove('pressed')" onmousedown="dpadInput('down')">▼</div>
    </div>
  </div>

  <!-- Result -->
  <div class="game-result" id="gameResult">
    <div class="result-icon" id="resultIcon">🎉</div>
    <div style="font-size:14px;color:rgba(255,255,255,0.5);">最終得分</div>
    <div class="result-score" id="resultScore">0</div>
    <div class="result-label" id="resultCombo"></div>
    <div class="result-threshold" id="resultThreshold"></div>
    <div class="result-fail" id="resultFail" style="display:none;"></div>
    <div class="result-bonus" id="resultBonus">
      <div class="trophy-row"><span class="trophy-icon">🏆</span><span class="trophy-text">第1名</span><span class="trophy-pts">團隊 +500</span></div>
      <div class="trophy-row"><span class="trophy-icon">🥈</span><span class="trophy-text">第2名</span><span class="trophy-pts">團隊 +400</span></div>
      <div class="trophy-row"><span class="trophy-icon">🥉</span><span class="trophy-text">第3名</span><span class="trophy-pts">團隊 +300</span></div>
      <div class="trophy-row"><span class="trophy-icon">🏅</span><span class="trophy-text">第4名</span><span class="trophy-pts">團隊 +200</span></div>
      <div class="trophy-row"><span class="trophy-icon">🏅</span><span class="trophy-text">第5名</span><span class="trophy-pts">團隊 +100</span></div>
    </div>
    <!-- Frank Message -->
    <div class="frank-section" id="frankSection" style="display:none;">
      <div class="frank-card">
        <div class="frank-header">
          <div class="frank-avatar">🧔‍♂️</div>
          <div><div class="frank-name">Frank 法蘭克</div><div class="frank-role">TSMC BSID 主管</div></div>
        </div>
        <div class="frank-msg" id="frankMsg"></div>
        <div class="frank-responses" id="frankResponses"></div>
        <div class="frank-reply" id="frankReply"></div>
      </div>
    </div>
    <button class="btn btn-primary btn-lg btn-submit" id="btnSubmit" style="margin-top:20px;" onclick="submitAndReturn()">📤 提交分數</button>
    <button class="btn btn-outline" style="margin-top:10px;color:white;border-color:rgba(255,255,255,0.3);" onclick="window.location.href='map.html'">↩ 返回地圖</button>
  </div>

  <!-- Settings / Pause -->
  <div id="gameSettings" style="display:none;position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);z-index:70;flex-direction:column;align-items:center;justify-content:center;gap:12px;">
    <div class="pause-label">⏸️ 暫停中</div>
    <button class="btn btn-primary btn-lg" onclick="closeGameSettings()">▶ 繼續遊戲</button>
    <button class="btn btn-outline" style="color:white;border-color:rgba(255,255,255,0.3);" onclick="window.location.reload()">🔄 重新開始</button>
    <button class="btn btn-outline" style="color:white;border-color:rgba(255,255,255,0.3);" onclick="window.location.href='map.html'">↩ 返回地圖</button>
    <button class="btn btn-outline" style="color:#f44336;border-color:rgba(244,67,54,0.3);" onclick="Auth.logout();window.location.href='index.html'">🚪 登出</button>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/audio.js"></script>
<script src="js/chat.js"></script>
<script>
  // === Init ===
  if (!Auth.requireLogin()) throw new Error('未登入');
  AudioEngine.init(); API.init();
  try { Chat.init(); Chat.initDanmaku('danmakuContainer'); } catch(e) { console.warn('Chat init failed', e); }

  const params = new URLSearchParams(window.location.search);
  const gameId = params.get('id');
  const gameConfig = getGameById(gameId);
  if (!gameConfig) { alert('遊戲不存在'); window.location.href = 'map.html'; throw new Error('no game'); }
  if (gameConfig.type === 'photo') { window.location.href = 'photo-task.html'; throw new Error('redirect'); }

  document.getElementById('gameTitle').textContent = gameConfig.icon + ' ' + gameConfig.name;
  document.getElementById('introIcon').textContent = gameConfig.icon;
  document.getElementById('introTitle').textContent = gameConfig.name;
  document.getElementById('introDesc').textContent = gameConfig.description;
  document.getElementById('introRounds').textContent = gameConfig.hasRounds ? '🔄 回合制：破關後自動進入下一關，難度提升！' : '';

  // D-Pad for directional games
  const DPAD_GAMES = ['pacman', 'snake'];
  if (DPAD_GAMES.includes(gameId)) {
    document.getElementById('dpadContainer').classList.add('active');
    document.getElementById('canvasContainer').classList.add('has-dpad');
  }

  // === Engine Map ===
  const GAME_ENGINES = {
    pacman:{file:'js/games/pacman.js',engine:'PacmanGame'},
    snake:{file:'js/games/snake.js',engine:'SnakeGame'},
    whack:{file:'js/games/whack.js',engine:'WhackGame'},
    memory:{file:'js/games/memory.js',engine:'MemoryGame'},
    quiz:{file:'js/games/quiz.js',engine:'QuizGame'},
    catch:{file:'js/games/catch.js',engine:'CatchGame'},
    breaker:{file:'js/games/breaker.js',engine:'BreakerGame'},
    shooter:{file:'js/games/shooter.js',engine:'ShooterGame'},
    dodge:{file:'js/games/dodge.js',engine:'DodgeGame'},
    reaction:{file:'js/games/reaction.js',engine:'ReactionGame'},
    rhythm:{file:'js/games/rhythm.js',engine:'RhythmGame'},
    puzzle:{file:'js/games/puzzle.js',engine:'PuzzleGame'},
    'cook-boba':{file:'js/games/cook-boba.js',engine:'CookBobaGame'},
    'cook-beef':{file:'js/games/cook-beef.js',engine:'CookBeefGame'},
    'cook-dumpling':{file:'js/games/cook-dumpling.js',engine:'CookDumplingGame'},
    'cook-shaved':{file:'js/games/cook-shaved.js',engine:'CookShavedGame'},
    'cook-cake':{file:'js/games/cook-cake.js',engine:'CookCakeGame'}
  };

  let gameEngine = null;
  const gameEntry = GAME_ENGINES[gameId];
  const btnStart = document.getElementById('btnStart');
  const loadingMsg = document.getElementById('loadingMsg');

  // === Load Script ===
  function loadGameScript() {
    if (!gameEntry) return Promise.resolve(null);
    return fetch(gameEntry.file + '?v=' + Date.now())
      .then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.text(); })
      .then(function(code) {
        new Function(code)();
        var engine = window[gameEntry.engine];
        if (!engine) throw new Error('Engine not found after eval: ' + gameEntry.engine);
        return engine;
      });
  }

  loadGameScript().then(engine => {
    gameEngine = engine;
    btnStart.disabled = false;
    btnStart.innerHTML = '🎮 開始遊戲';
    btnStart.onclick = startCountdown;
    loadingMsg.textContent = '準備就緒！';
    loadingMsg.style.color = '#4caf50';
  }).catch(err => {
    console.error('Game load error:', err);
    loadingMsg.textContent = '載入失敗：' + err.message;
    loadingMsg.style.color = '#f44336';
    btnStart.disabled = false;
    btnStart.innerHTML = '🔄 重新載入';
    btnStart.onclick = () => {
      if ('caches' in window) {
        caches.keys().then(keys => Promise.all(keys.map(k => caches.delete(k)))).then(() => window.location.reload());
      } else { window.location.reload(); }
    };
  });

  // === 防作弊：遊戲開始時向後端要 Token ===
  var _gameToken = null, _gameStartTime = null;
  async function requestGameToken() {
    try {
      var session = Auth.getSession();
      var data = await API.get('startGame', { action: 'startGame', playerId: session.playerId, gameId: gameId }, 0);
      if (data && data.gameToken) { _gameToken = data.gameToken; _gameStartTime = data.startTime; }
    } catch(e) { console.warn('Token request failed', e); }
  }

  // === 防作弊：分數簽章 ===
  async function signScore(score) {
    if (!_gameStartTime) return { signature: null, startTime: null };
    var raw = Auth.getSession().playerId + '|' + gameId + '|' + score + '|' + _gameStartTime + '|' + 'mw_s3cure_2026';
    // Web Crypto SHA-256
    try {
      var enc = new TextEncoder();
      var hashBuf = await crypto.subtle.digest('SHA-256', enc.encode(raw));
      var hex = Array.from(new Uint8Array(hashBuf)).map(function(b) { return ('0' + b.toString(16)).slice(-2); }).join('');
      return { signature: hex.substring(0, 16), startTime: _gameStartTime };
    } catch(e) {
      return { signature: null, startTime: _gameStartTime };
    }
  }

  // === GameState ===
  const GameState = {
    running: false, paused: false,
    score: 0, combo: 0, maxCombo: 0,
    lives: 3, maxLives: 3,
    timeLeft: gameConfig.duration || 60,
    canvas: null, ctx: null, timer: null, animFrame: null,
    round: 1,

    updateHUD() {
      document.getElementById('hudScore').textContent = this.score;
      document.getElementById('hudTime').textContent = this.timeLeft;
      // Lives
      var livesEl = document.getElementById('hudLives');
      var h = '';
      for (var i = 0; i < this.maxLives; i++) h += '<span class="heart' + (i >= this.lives ? ' lost' : '') + '">❤️</span>';
      livesEl.innerHTML = h;
      // Time color
      var timeEl = document.getElementById('hudTime');
      if (this.timeLeft <= 10) timeEl.style.color = '#f44336';
      else if (this.timeLeft <= 20) timeEl.style.color = '#ff9800';
      else timeEl.style.color = 'white';
    },

    addScore(pts) {
      this.score += pts;
      this.updateHUD();
      AudioEngine.scoreUp();
      if (navigator.vibrate) navigator.vibrate(20);
    },
    addCombo() {
      this.combo++;
      if (this.combo > this.maxCombo) this.maxCombo = this.combo;
      AudioEngine.comboHit(this.combo);
      if (navigator.vibrate) navigator.vibrate(30);
    },
    resetCombo() { this.combo = 0; this.updateHUD(); },

    loseLife() {
      this.lives--;
      this.updateHUD();
      AudioEngine.penalty();
      if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
      if (this.lives <= 0) {
        this.running = false;
      }
      return this.lives;
    },

    showRoundBanner(round) {
      this.round = round;
      document.getElementById('roundDisplay').textContent = 'R' + round;
      var banner = document.createElement('div');
      banner.className = 'round-banner';
      banner.textContent = '🔥 Round ' + round;
      document.body.appendChild(banner);
      AudioEngine.roundClear();
      if (navigator.vibrate) navigator.vibrate([100, 50, 200]);
      setTimeout(function() { banner.remove(); }, 1500);
    }
  };

  // === D-Pad ===
  function dpadInput(dir) {
    if (!gameEngine || !GameState.running || GameState.paused) return;
    if (gameEngine.setDirection) gameEngine.setDirection(dir);
    AudioEngine.tapButton();
    if (navigator.vibrate) navigator.vibrate(15);
  }

  // === Canvas ===
  const canvas = document.getElementById('gameCanvas');
  const containerEl = document.getElementById('canvasContainer');
  function resizeCanvas() {
    canvas.width = Math.min(400, containerEl.clientWidth);
    canvas.height = Math.min(600, containerEl.clientHeight > 20 ? containerEl.clientHeight - 20 : 500);
  }
  resizeCanvas();
  GameState.canvas = canvas;
  GameState.ctx = canvas.getContext('2d');

  // === Countdown ===
  function startCountdown() {
    if (!gameEngine) {
      loadingMsg.textContent = '引擎未就緒，重新載入中...';
      if ('caches' in window) {
        caches.keys().then(keys => Promise.all(keys.map(k => caches.delete(k)))).then(() => window.location.reload());
      } else { window.location.reload(); }
      return;
    }
    document.getElementById('gameIntro').style.display = 'none';
    var cd = document.getElementById('gameCountdown');
    cd.style.display = 'flex';
    var count = 3;
    document.getElementById('countdownNum').textContent = count;
    AudioEngine.countdown();
    if (navigator.vibrate) navigator.vibrate(50);
    var ci = setInterval(function() {
      count--;
      if (count > 0) {
        document.getElementById('countdownNum').textContent = count;
        AudioEngine.countdown();
        if (navigator.vibrate) navigator.vibrate(50);
      } else {
        clearInterval(ci);
        cd.style.display = 'none';
        startGame();
      }
    }, 1000);
  }

  // === Start ===
  function startGame() {
    GameState.running = true;
    GameState.paused = false;
    GameState.score = 0;
    GameState.combo = 0;
    GameState.maxCombo = 0;
    GameState.lives = 3;
    GameState.maxLives = 3;
    GameState.round = 1;
    GameState.timeLeft = gameConfig.duration || 60;
    GameState.updateHUD();
    document.getElementById('roundDisplay').textContent = 'R1';
    // 防作弊：向後端請求遊戲 Token（記錄開始時間）
    requestGameToken();
    AudioEngine.gameStart();
    if (navigator.vibrate) navigator.vibrate(200);

    try {
      gameEngine.init(GameState);
    } catch (err) {
      console.error('Game init error:', err);
      alert('遊戲初始化失敗: ' + err.message);
      window.location.href = 'map.html';
      return;
    }

    // Timer
    GameState.timer = setInterval(function() {
      if (GameState.paused) return;
      if (!GameState.running) { endGame(); return; }
      GameState.timeLeft--;
      GameState.updateHUD();
      if (GameState.timeLeft === 10) { AudioEngine.playTone(440, 0.2, 'square', 0.15); if (navigator.vibrate) navigator.vibrate([100,50,100]); }
      else if (GameState.timeLeft <= 5 && GameState.timeLeft > 0) { AudioEngine.playTone(880, 0.1, 'square', 0.2); if (navigator.vibrate) navigator.vibrate(50); }
      if (GameState.timeLeft <= 0) { GameState.running = false; endGame(); }
    }, 1000);

    // Game loop
    function loop() {
      if (!GameState.running) { checkGameEnd(); return; }
      if (!GameState.paused) {
        try {
          if (gameEngine.update) gameEngine.update();
          if (gameEngine.render) gameEngine.render();
        } catch (err) { console.error('Game loop error:', err); }
      }
      GameState.animFrame = requestAnimationFrame(loop);
    }
    GameState.animFrame = requestAnimationFrame(loop);
  }

  // Check if game ended (lives = 0) via game loop
  function checkGameEnd() {
    if (!GameState.running && GameState.timer) {
      endGame();
    }
  }

  // === Frank Messages ===
  var FRANK_SUCCESS = [

    { msg: '看到這分數我都想幫你加薪了…可惜我也只是打工的 😂', responses: ['那先加雞腿吧！🍗', '精神上的加薪我收到了 💰', '老闆你最帥了！✨'] },
    { msg: '你剛剛的表現堪稱教科書等級，讓我回味一下…🤩', responses: ['要不要我再表演一次？😏', '截圖存起來當傳家寶！📸', '低調低調，怕同事嫉妒 🤫'] },

    { msg: 'BSID 有你真好！你就是團隊的 MVP 🌟', responses: ['是 BSID 讓我發光的！🌟', 'MVP 是每一位隊友！🤝', '等等，MVP 有獎金嗎？💸'] }
  ];
  var FRANK_FAIL = [
    { msg: '沒事沒事，愛迪生失敗了一千次才發明燈泡，你才第一次而已！💡', responses: ['我是在累積經驗值！📈', '愛迪生沒有手機遊戲 😤', '下次一定！拳頭硬了 👊'] },
    { msg: '你知道嗎？失敗是成功的老母親。去吧，讓老母親驕傲！🫶', responses: ['我這就去認親！😂', '老母親等我凱旋歸來！🏃', '這比喻太有畫面了 😆'] },
    { msg: '別灰心！我當年第一次報告也被打槍，現在不也活得好好的嗎 😌', responses: ['老闆你的故事好勵志 🥹', '所以重點是活著就好？😂', '我馬上重新挑戰！🔥'] },
    { msg: '這次只是熱身！等你全力以赴的時候，分數肯定爆表 🚀', responses: ['對！我還沒認真呢 😤', '熱身結束，開始發力！💪', '老闆你真會安慰人 🥺'] },
    { msg: '失敗不可怕，可怕的是不敢再試一次。BSID 的勇者不怕跌倒！⚔️', responses: ['我是 BSID 最勇的勇者！⚔️', '跌倒了就再爬起來！🧗', '老闆這台詞好帥 🤩'] }
  ];
  var FRANK_REPLIES = [
    '哈哈哈！你的反應也太可愛了吧，繼續加油！🔥',
    '就是這個態度！BSID 精神就是永不放棄 💪',
    '笑死我了 😂 好啦好啦，趕快去下一關吧！',
    '收到！我會在終點等你們凱旋歸來的 🏁',
    '哈哈 你真的很有趣耶！快去拿更多分吧 🎯'
  ];

  function showFrankMessage(passed) {
    var pool = passed ? FRANK_SUCCESS : FRANK_FAIL;
    var frank = pool[Math.floor(Math.random() * pool.length)];
    document.getElementById('frankMsg').textContent = frank.msg;
    var respEl = document.getElementById('frankResponses');
    respEl.innerHTML = '';
    frank.responses.forEach(function(r, i) {
      var btn = document.createElement('button');
      btn.className = 'frank-resp-btn';
      btn.textContent = r;
      btn.onclick = function() {
        respEl.querySelectorAll('.frank-resp-btn').forEach(function(b) { b.classList.remove('selected'); b.style.pointerEvents = 'none'; });
        btn.classList.add('selected');
        var reply = FRANK_REPLIES[Math.floor(Math.random() * FRANK_REPLIES.length)];
        var replyEl = document.getElementById('frankReply');
        replyEl.textContent = '💬 Frank：' + reply;
        replyEl.style.display = 'block';
        if (typeof AudioEngine !== 'undefined') AudioEngine.tapButton();
      };
      respEl.appendChild(btn);
    });
    document.getElementById('frankSection').style.display = 'block';
  }

  // === End Game ===
  var _gameEnded = false;
  function endGame() {
    if (_gameEnded) return; // prevent double call
    _gameEnded = true;
    if (GameState.timer) { clearInterval(GameState.timer); GameState.timer = null; }
    GameState.running = false;
    if (GameState.animFrame) { cancelAnimationFrame(GameState.animFrame); GameState.animFrame = null; }
    try { if (gameEngine && gameEngine.cleanup) gameEngine.cleanup(); } catch(e) { console.warn('Cleanup error', e); }

    AudioEngine.gameEnd();
    if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 300]);

    var threshold = gameConfig.threshold || 0;
    var passed = GameState.score >= threshold;

    document.getElementById('resultIcon').textContent = passed ? '🏆' : '😢';
    document.getElementById('resultScore').textContent = GameState.score;
    document.getElementById('resultCombo').textContent = GameState.maxCombo > 0 ? '🔥 最高連擊 ' + GameState.maxCombo : '';
    document.getElementById('resultThreshold').textContent = '過關門檻: ' + threshold + ' 分';

    var failEl = document.getElementById('resultFail');
    var bonusEl = document.getElementById('resultBonus');
    var submitBtn = document.getElementById('btnSubmit');

    if (passed) {
      failEl.style.display = 'none';
      bonusEl.style.display = 'block';
      submitBtn.style.display = 'block';
      submitBtn.disabled = false;
      submitBtn.className = 'btn btn-primary btn-lg btn-submit';
      submitBtn.textContent = '📤 提交分數';
    } else {
      failEl.style.display = 'block';
      failEl.textContent = '未達過關門檻 (' + threshold + '分)，無法提交分數';
      bonusEl.style.display = 'none';
      submitBtn.style.display = 'none';
    }

    showFrankMessage(passed);
    document.getElementById('gameResult').style.display = 'flex';
  }

  // === Submit ===
  async function submitAndReturn() {
    var btn = document.getElementById('btnSubmit');
    btn.disabled = true;
    btn.className = 'btn btn-primary btn-lg btn-submit submitting';
    btn.textContent = '⏳ 提交中...';
    var session = Auth.getSession();
    try {
      // 防作弊：附帶簽章
      var sig = await signScore(GameState.score);
      var result = await API.post('WRITE', {
        action: 'submitScore',
        playerId: session.playerId,
        playerName: session.name,
        teamId: session.teamId,
        gameId: gameId,
        score: GameState.score,
        signature: sig.signature,
        startTime: sig.startTime
      });
      // 檢查是否被後端攔截
      if (result && (result.blocked || result.rateLimited)) {
        btn.className = 'btn btn-primary btn-lg btn-submit';
        btn.textContent = result.rateLimited ? '⏳ 請稍後再試' : '⚠️ 提交異常';
        btn.disabled = true;
        return;
      }
      btn.className = 'btn btn-primary btn-lg btn-submit submitted';
      btn.textContent = '✅ 已提交成功！';
      // Mark game as completed in localStorage
      try {
        var gs = JSON.parse(localStorage.getItem('gameStatus') || '{}');
        gs[gameId] = 'completed';
        localStorage.setItem('gameStatus', JSON.stringify(gs));
      } catch(e) {}
      AudioEngine.uploadSuccess();
      if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
    } catch (err) {
      console.error('Submit error:', err);
      btn.className = 'btn btn-primary btn-lg btn-submit';
      btn.textContent = '❌ 提交失敗，點擊重試';
      btn.disabled = false;
    }
  }

  // === Pause ===
  function showGameSettings() {
    GameState.paused = true;
    if (GameState.animFrame) { cancelAnimationFrame(GameState.animFrame); GameState.animFrame = null; }
    document.getElementById('gameSettings').style.display = 'flex';
    AudioEngine.tapButton();
  }
  function closeGameSettings() {
    document.getElementById('gameSettings').style.display = 'none';
    GameState.paused = false;
    if (GameState.running) {
      // Restart game loop
      function loop() {
        if (!GameState.running) { checkGameEnd(); return; }
        if (!GameState.paused) {
          try {
            if (gameEngine.update) gameEngine.update();
            if (gameEngine.render) gameEngine.render();
          } catch (err) { console.error('Game loop error:', err); }
        }
        GameState.animFrame = requestAnimationFrame(loop);
      }
      GameState.animFrame = requestAnimationFrame(loop);
    }
    AudioEngine.tapButton();
  }

  // === Keyboard ===
  document.addEventListener('keydown', function(e) {
    var map = { ArrowUp:'up', ArrowDown:'down', ArrowLeft:'left', ArrowRight:'right', w:'up', s:'down', a:'left', d:'right', W:'up', S:'down', A:'left', D:'right' };
    if (map[e.key]) { e.preventDefault(); dpadInput(map[e.key]); }
    if (e.key === 'Escape') {
      if (document.getElementById('gameSettings').style.display === 'flex') closeGameSettings();
      else if (GameState.running) showGameSettings();
    }
  });
</script>
